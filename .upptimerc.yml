# Change these first
owner: doctor-versum # Your GitHub organization or username, where this repository lives
repo: upptime # The name of this repository

sites:
  - name: Homepage
    url: https://doctor-versum.me
    maxResponseTime: 700
  - name: Homepage (Redirect)
    url: https://www.doctor-versum.me
    maxResponseTime: 700
  - name: QuizzX
    url: https://quizzx.doctor-versum.me
    maxResponseTime: 700
  - name: Share
    url: share.doctor-versum.me
    maxResponseTime: 700
  - name: Rammerhead
    url: $RAMMERHEAD_DOMAIN
  - name: Survey
    url: $SURVEY_DOMAIN
  - name: GitHub
    url: https://GitHub.com
    maxResponseTime: 700
  - name: Status
    url: https://status.doctor-versum.me
    maxResponseTime: 700

skipDeleteIssues: true
assignees:
  - doctor-versum

status-website:
  theme: night
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  cname: status.doctor-versum.me
  # baseUrl: /your-repo-name
  logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
  name: Doctor Versum - Status
  introTitle: "**Welcome!** Having problems with my Pages?"
  introMessage: "This status page is run by [Upptime](https://github.com/upptime/upptime). It runs in github pages. If my status page *and* my own pages are down, most likely some backbone provider is having issues. Look here for detailes: [Cloudflare](https://www.cloudflarestatus.com/) | [AWS](https://health.aws.amazon.com/health/status) | [GCP](https://status.cloud.google.com/) | [Azure](https://azure.status.microsoft/)"
  navbar:
    - title: Status
      href: /
    - title: Homepage
      href: https://doctor-versum.me/
    - title: GitHub
      href: https://github.com/$OWNER/

# Upptime also supports notifications, assigning issues, and more
# See https://upptime.js.org/docs/configuration
